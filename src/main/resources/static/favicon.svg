  <ellipse cx="21.5" cy="13" rx="3.5" ry="2.5" fill="white" opacity="0.5" transform="rotate(20 21.5 13)"/>
  <!-- DB symbol on body -->
  <ellipse cx="16" cy="21.5" rx="3" ry="1.2" fill="none" stroke="#1A1A2E" stroke-width="0.8" opacity="0.5"/>
  <path d="M13 21.5v-2c0-.66 1.34-1.2 3-1.2s3 .54 3 1.2v2" fill="none" stroke="#1A1A2E" stroke-width="0.8" opacity="0.5"/>
