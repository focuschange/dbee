  <path d="M14 5.5Q12 2 10 3" fill="none" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M18 5.5Q20 2 22 3" fill="none" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="10" cy="3" r="1" fill="#F7C948"/>
  <circle cx="22" cy="3" r="1" fill="#F7C948"/>
