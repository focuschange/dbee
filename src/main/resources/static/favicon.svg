<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#F7C948"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#1A1A2E"/>
  <!-- Bee body -->
  <ellipse cx="16" cy="17" rx="6.5" ry="7" fill="url(#g)"/>
  <!-- Stripes -->
  <rect x="9.5" y="14" width="13" height="2" rx="1" fill="#1A1A2E" opacity="0.7"/>
  <rect x="9.5" y="18" width="13" height="2" rx="1" fill="#1A1A2E" opacity="0.7"/>
  <!-- Head -->
  <circle cx="16" cy="9" r="4" fill="url(#g)"/>
  <!-- Eyes -->
  <circle cx="14.2" cy="8.5" r="1.2" fill="#1A1A2E"/>
  <circle cx="17.8" cy="8.5" r="1.2" fill="#1A1A2E"/>
  <circle cx="14.5" cy="8.2" r="0.4" fill="white"/>
  <circle cx="18.1" cy="8.2" r="0.4" fill="white"/>
